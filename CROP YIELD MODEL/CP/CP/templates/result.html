<!doctype html>
<html>
  <head>
    <title>Prediction Result</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body style="background: #f5f5f5">
    <div class="container mt-5">
      <h1 class="text-center text-success">Crop Yield Prediction Result</h1>

      <div class="card mt-4 shadow p-4 text-center">

        <h2 class="text-primary mt-3">{{ prediction }}</h2>

      </div>
    </div>
  </body>
</html>
