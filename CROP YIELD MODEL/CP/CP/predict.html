<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crop Predictor Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- DASHBOARD LAYOUT -->
<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-white text-black p-6">
    <h2 class="text-2xl font-bold mb-10">🌾 CropPredict AI</h2>

    <nav class="space-y-4">
      <a href="#" class="block hover:bg-green-500 p-3 rounded-lg">Dashboard</a>
      <a href="#" class="block hover:bg-green-500 p-3 rounded-lg">Prediction</a>
      <a href="#" class="block hover:bg-green-500 p-3 rounded-lg">History</a>
      <a href="#" class="block hover:bg-green-500 p-3 rounded-lg">About</a>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 p-8">

    <!-- TOP BAR -->
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold text-gray-700">
        Crop Yield Prediction Dashboard
      </h1>

      <div class="bg-white px-4 py-2 rounded-lg shadow">
        👨‍🌾 Farmer Panel
      </div>
    </div>

    <!-- STATS CARDS -->
    <div class="grid md:grid-cols-3 gap-6 mb-8">

      <div class="bg-white p-6 rounded-2xl shadow">
        <h3 class="text-gray-500">Total Predictions</h3>
        <p class="text-2xl font-bold text-green-700">124</p>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow">
        <h3 class="text-gray-500">Avg Yield</h3>
        <p class="text-2xl font-bold text-green-700">3.5 t/ha</p>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow">
        <h3 class="text-gray-500">Best Crop</h3>
        <p class="text-2xl font-bold text-green-700">Rice</p>
      </div>

    </div>

    <!-- PREDICTION FORM CARD -->
    <div class="bg-white rounded-2xl shadow p-8">

      <h2 class="text-2xl font-bold text-green-700 mb-6">
        Enter Crop Details
      </h2>

      <form method="POST" class="grid md:grid-cols-2 gap-6">

        <div>
          <label class="block text-gray-700 mb-2">Rainfall (mm)</label>
          <input type="number" step="any" name="rainfall"
          class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-green-400 outline-none" required>
        </div>

        <div>
          <label class="block text-gray-700 mb-2">Temperature (°C)</label>
          <input type="number" step="any" name="temperature"
          class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-green-400 outline-none" required>
        </div>

        <div>
          <label class="block text-gray-700 mb-2">Humidity (%)</label>
          <input type="number" step="any" name="humidity"
          class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-green-400 outline-none" required>
        </div>

        <div>
          <label class="block text-gray-700 mb-2">Soil Type</label>
          <select name="soil"
          class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-green-400 outline-none">
            <option>Loamy</option>
            <option>Clay</option>
            <option>Sandy</option>
          </select>
        </div>

        <div class="md:col-span-2">
          <button type="submit"
          class="w-full bg-green-600 text-white py-3 rounded-xl hover:bg-green-700 transition transform hover:scale-105">
            Predict Yield
          </button>
        </div>

      </form>

      <!-- RESULT AREA -->
      {% if result %}
      <div class="mt-6 bg-green-100 p-4 rounded-lg text-center">
        <h3 class="text-xl font-bold text-green-800">
          Predicted Yield: {{ result }} tons/hectare
        </h3>
      </div>
      {% endif %}

    </div>

  </main>
</div>

</body>
</html>
